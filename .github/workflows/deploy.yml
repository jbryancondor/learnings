name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["Security Scan"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy runs at a time; queued runs wait, they don't cancel.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # Only deploy when the Security Scan workflow succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Full repo deploy — deploys every folder on every push to main.
      # TODO (implement later): switch to path-filtered deploys so only
      # changed folders trigger a new deployment, reducing noise and build time.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
